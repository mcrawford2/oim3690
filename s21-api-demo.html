<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S21 API Demo</title>
</head>
<body>
    <button>Click</button>
    <p id="result"></p>

    <script>
        const btn = document.querySelector('button');
        const result = document.querySelector('#result');

        async function getRandomWord () {
            const response = await fetch('https://oim.108122.xyz/words/random');
            const word = await response.json();
            console.log(word);
            result.innerHTML += `<p>Random Word: ${word}</p>`;
        }

        function showStuff() {
            result.innerHTML += "<p>Hello, World!</p>";
        }

        async function showTowns() {
            const response = await fetch('https://oim.108122.xyz/mass', {
                headers: {
                    "X-Token": "mirandamiranda",
                },
            });
            const data = await response.json();

            console.log(data.name); //MA

            for (const town of data.data) {
                result.innerHTML += `<p>${town.name}: ${town.population}</p>`;
            }

            // console.log(data.data.length); // undefined

        }

        btn.addEventListener("click", () => {
            getRandomWord();
            showStuff();
            showTowns();
        });
    </script>
</body>

</html>
