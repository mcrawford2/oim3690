<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>To Do List</title>
	<link rel="stylesheet" href="css/css/todo.css" />
</head>
<body>
	<main class="app">
		<h1>To Do List</h1>

		<form id="todo-form" class="input-row" autocomplete="off">
			<input id="todo-input" type="text" placeholder="What do you need to do?" maxlength="120" />
			<button class="add-btn" type="submit">Add Task</button>
		</form>

		<section class="toolbar" aria-live="polite">
			<span id="remaining-count">0 items left</span>
			<button id="clear-completed" class="clear-btn" type="button">Clear completed</button>
		</section>

		<ul id="todo-list"></ul>
		<p id="empty-state" class="empty">No todos yet. Add your first one above.</p>

		<section class="long-term-card" aria-label="Long Term To Do List">
			<h2>Long Term To Do List</h2>
			<form id="long-term-form" class="input-row" autocomplete="off">
				<input id="long-term-input" type="text" placeholder="Add a long-term task" maxlength="160" />
				<button class="add-btn" type="submit">Add Long Term Task</button>
			</form>
			<ul id="long-term-list"></ul>
			<p id="long-term-empty" class="empty">No long-term tasks yet.</p>
		</section>
	</main>

	<script src="css/css/js/todo.js"></script>
</body>
</html>
